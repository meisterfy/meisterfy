run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - noctx
    - bodyclose
    - sqlclosecheck
    - revive
    - testifylint
    - paralleltest

linters-settings:
  revive:
    rules:
      - name: exported
      - name: error-return

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec]
