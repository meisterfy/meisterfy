name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================== BACKEND =====================

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...

  go-test-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - name: Unit tests with race detector and coverage
        working-directory: backend
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Show coverage summary
        working-directory: backend
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend-unit
          fail_ci_if_error: false

  go-test-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - name: Run goose migrations
        working-directory: backend
        run: go run ./cmd/migrate up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable
      - name: Integration tests
        working-directory: backend
        run: go test -tags=integration -race -count=1 ./...
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable

  go-security:
    name: Go Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: backend
        run: govulncheck ./...

  # ===================== FRONTEND =====================

  frontend-quality:
    name: Frontend Quality (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: bun run lint
      - name: Type check
        working-directory: frontend
        run: bun run check

  frontend-test:
    name: Frontend Unit and Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install chromium --with-deps
      - name: Run tests with coverage
        working-directory: frontend
        run: bun run test:unit -- --run --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: bun run build

  smoke-test:
    name: Go Smoke Tests
    runs-on: ubuntu-latest
    needs: [go-build, go-test-integration]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create stub ui/dist for embed
        run: mkdir -p backend/cmd/server/ui/dist && touch backend/cmd/server/ui/dist/.keep
      - name: Run migrations
        working-directory: backend
        run: go run ./cmd/migrate up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable
      - name: Start server in background
        working-directory: backend
        run: |
          DATABASE_URL="postgres://test:test@localhost:5432/testdb?sslmode=disable" \
          JWT_SECRET="ci-smoke-secret-32-bytes-minimum!" \
          go run ./cmd/server &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/health && break
            sleep 1
          done
      - name: Run smoke tests
        working-directory: backend
        run: go test -tags=smoke -v ./smoke/...

  # ===================== GATE =====================

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - go-lint
      - go-build
      - go-test-unit
      - go-test-integration
      - go-security
      - smoke-test
      - frontend-quality
      - frontend-test
      - frontend-build
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJSON(needs) }}'
          if echo "$results" | grep -q '"result":"failure"'; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed"
